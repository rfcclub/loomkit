name: LoomKit Verify
on:
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node dist/cli/index.js verify
